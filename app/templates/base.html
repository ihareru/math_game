<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Math Game</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body
style="
background-color: {{ settings.background_color }};
{% if settings.background_image %}
background-image:url('/static/backgrounds/{{ settings.background_image }}');
background-size:cover;
{% endif %}
">


{% if current_profile %}
    <h3>👦 Игрок:
        {{ current_profile.name }} ⭐ {{ current_profile.stars }}
    </h3>
{% endif %}

{% block content %}
{% endblock %}

<audio autoplay loop>
    <source src="{{ url_for('static',
    filename='music/background.mp3') }}">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="{{ url_for('static', filename='js/effects.js') }}"></script>

</body>
</html>
